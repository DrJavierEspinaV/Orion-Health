
<!doctype html>
<html lang="es">
<head>


<div style="background:red;color:white;padding:8px;font-weight:bold;position:fixed;top:0;left:0;right:0;z-index:9999;">
INDEX NUEVO OK
</div>


  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ORION — Portal</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#F6F3EE;
    }

    header{
      background:#0E4A66;
      color:white;
      padding:12px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    button{
      padding:10px 14px;
      border:none;
      cursor:pointer;
      background:white;
      border-radius:6px;
      font-weight:bold;
    }

    iframe{
      width:100%;
      height:calc(100vh - 60px);
      border:none;
      display:none;
      background:#fff;
    }

    iframe.active{
      display:block;
    }
  </style>
</head>

<body>

<header>
  <button type="button" onclick="showApp('comunicaciones')">Comunicaciones</button>
  <button type="button" onclick="showApp('recetas')">Receta</button>
</header>

<iframe id="frame-comunicaciones" title="Comunicaciones"></iframe>
<iframe id="frame-recetas" title="Receta"></iframe>

<script>
/***************************************************
 * CONFIG GITHUB
 ***************************************************/
const BASE = '/Orion-Health/';

const URLS = {
  comunicaciones: BASE + 'Orion_Comunicaciones_Clinicas_v4.5 PRO BD.html',
  recetas: BASE + 'orion-recetas-v4.3_20.html'
};

/***************************************************
 * EVENTOS ORION
 ***************************************************/
const EVENT_SET_NEW = 'ORION_SET_DOCUMENTO_PACIENTE';
const EVENT_CLEAR_NEW = 'ORION_CLEAR_DOCUMENTO_PACIENTE';
const EVENT_SET_LEGACY = 'ORION_SET_RECETA_PACIENTE';
const EVENT_CLEAR_LEGACY = 'ORION_CLEAR_RECETA_PACIENTE';
const EVENT_GET_NEW = 'ORION_GET_DOCUMENTO_PACIENTE';
const EVENT_GET_LEGACY = 'ORION_GET_RECETA_PACIENTE';
const EVENT_NAV = 'ORION_NAVIGATE_TO_APP';

const EVENT_SYNC_NEW = 'ORION_DOCUMENTO_PACIENTE_SYNC';
const EVENT_SYNC_LEGACY = 'ORION_RECETA_PACIENTE_SYNC';

/***************************************************
 * ESTADO GLOBAL
 ***************************************************/
let activeApp = null;
let documentoPaciente = null;

/***************************************************
 * HELPERS
 ***************************************************/
function normalizePayload(payload){
  if (!payload || typeof payload !== 'object') return null;

  return {
    nombre: String(payload.nombre || payload.nombreCompleto || payload.paciente || '').trim(),
    rut: String(payload.rut || payload.run || '').trim(),
    edad: String(payload.edad || '').trim()
  };
}

function getFrame(app){
  return document.getElementById(`frame-${app}`);
}

function ensureFrameSrc(app){
  const frame = getFrame(app);
  if (!frame) return null;

  const expected = URLS[app];
  if (!expected) return frame;

  const current = frame.getAttribute('src');
  if (!current) {
    frame.setAttribute('src', expected);
  }

  return frame;
}

function sendPacienteToReceta(){
  if (!documentoPaciente) return;

  const frame = getFrame('recetas');
  if (!frame || !frame.contentWindow) return;

  const payload = normalizePayload(documentoPaciente);
  if (!payload) return;

  frame.contentWindow.postMessage({
    type: EVENT_SYNC_NEW,
    payload
  }, '*');

  frame.contentWindow.postMessage({
    type: EVENT_SYNC_LEGACY,
    payload
  }, '*');
}

/***************************************************
 * NAVEGACIÓN
 ***************************************************/
function showApp(app) {
  activeApp = app;

  const frame = ensureFrameSrc(app);
  if (!frame) return;

  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  frame.classList.add('active');

  if (app === 'recetas' && documentoPaciente) {
    setTimeout(sendPacienteToReceta, 1200);
  }
}

/***************************************************
 * PUENTE ENTRE IFRAMES
 ***************************************************/
window.addEventListener('message', (event) => {
  const data = event.data || {};
  if (!data || typeof data !== 'object' || !data.type) return;

  console.log('📡 Portal recibe:', data.type, data);

  switch (data.type) {
    case EVENT_SET_NEW:
    case EVENT_SET_LEGACY: {
      documentoPaciente = normalizePayload(data.payload || null);
      console.log('🧠 Paciente guardado en portal:', documentoPaciente);
      break;
    }

    case EVENT_CLEAR_NEW:
    case EVENT_CLEAR_LEGACY: {
      documentoPaciente = null;
      console.log('🧹 Paciente activo limpiado');
      break;
    }

    case EVENT_GET_NEW:
    case EVENT_GET_LEGACY: {
      if (!documentoPaciente || !event.source) return;

      const payload = normalizePayload(documentoPaciente);

      event.source.postMessage({
        type: EVENT_SYNC_NEW,
        payload
      }, '*');

      event.source.postMessage({
        type: EVENT_SYNC_LEGACY,
        payload
      }, '*');

      console.log('📤 Portal respondió con paciente activo');
      break;
    }

    case EVENT_NAV: {
      const appKey = String(data.appKey || '').toLowerCase();

      if (appKey === 'cmf' || appKey === 'recetas' || appKey === 'receta') {
        showApp('recetas');
        setTimeout(sendPacienteToReceta, 1200);
      }
      break;
    }

    default:
      console.log('⚠️ Mensaje no manejado:', data.type);
      break;
  }
});

/***************************************************
 * CUANDO RECETA TERMINA DE CARGAR
 ***************************************************/
window.addEventListener('DOMContentLoaded', () => {
  const recetaFrame = getFrame('recetas');
  if (recetaFrame) {
    recetaFrame.addEventListener('load', () => {
      setTimeout(sendPacienteToReceta, 350);
    });
  }

  showApp('comunicaciones');
});
</script>

</body>
</html>
