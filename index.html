<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ORION — Portal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F6F3EE;
    }

    header {
      background: #0E4A66;
      color: white;
      padding: 12px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 14px;
      border: none;
      cursor: pointer;
      background: white;
      border-radius: 6px;
      font-weight: bold;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
      display: none;
    }

    iframe.active {
      display: block;
    }
  </style>
</head>

<body>

<header>
  <button onclick="showApp('comunicaciones')">Comunicaciones</button>
  <button onclick="showApp('recetas')">Receta</button>
</header>

<!-- IFAMES -->
<iframe id="frame-comunicaciones"></iframe>
<iframe id="frame-recetas"></iframe>

<script>
/***************************************************
 * CONFIG GITHUB
 ***************************************************/
const BASE = '/Orion-Health/';

const URLS = {
  comunicaciones: BASE + 'Orion_Comunicaciones_Clinicas_v4.5 PRO BD.html',
  recetas: BASE + 'orion-recetas-v4.3_20.html'
};

/***************************************************
 * ESTADO GLOBAL
 ***************************************************/
let activeApp = null;
let documentoPaciente = null;

/***************************************************
 * NAVEGACIÓN
 ***************************************************/
function showApp(app) {
  activeApp = app;

  const frame = document.getElementById(`frame-${app}`);

  if (!frame.src) {
    frame.src = URLS[app];
  }

  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  frame.classList.add('active');

  // Si hay paciente, lo mandamos a receta automáticamente
  if (app === 'recetas' && documentoPaciente) {
    setTimeout(() => {
      frame.contentWindow.postMessage({
        type: 'ORION_PACIENTE_ACTIVO',
        payload: documentoPaciente
      }, '*');
    }, 500);
  }
}

/***************************************************
 * PUENTE ENTRE IFRAMES
 ***************************************************/
window.addEventListener('message', (event) => {
  const data = event.data;

  if (!data || !data.type) return;

  console.log("📡 Portal recibe:", data.type);

  switch (data.type) {

    // 👉 Comunicaciones envía paciente
    case 'ORION_SET_DOCUMENTO_PACIENTE':
      documentoPaciente = data.payload;

      console.log("🧠 Paciente guardado en portal:", documentoPaciente);

      // ir automáticamente a receta
      showApp('recetas');
      break;

    // 👉 Receta pide paciente
    case 'ORION_GET_DOCUMENTO_PACIENTE':
      if (documentoPaciente) {
        event.source.postMessage({
          type: 'ORION_PACIENTE_ACTIVO',
          payload: documentoPaciente
        }, '*');
      }
      break;

    default:
      console.log("⚠️ Mensaje no manejado:", data.type);
  }
});

/***************************************************
 * INICIO
 ***************************************************/
showApp('comunicaciones');
</script>

</body>
</html>
